<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Favoritos | El rincón de mi Bebé</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/stylefavoritos.css">
</head>
<body>

<header class="encabezado_principal">
    <nav class="contenedor_navegacion">
        <input type="checkbox" id="controlador_menu" class="input_menu_oculto">
        <label for="controlador_menu" class="boton_hamburguesa">
            <span class="linea_menu"></span><span class="linea_menu"></span><span class="linea_menu"></span>
        </label>
        <div class="seccion_logo">
            <a href="../index.html" class="enlace_logo">
                <img src="../images/logo.png" alt="Logo" class="imagen_logo">
                <span class="nombre_marca">El rincón de mi Bebé</span>
            </a>
        </div>
        <ul class="lista_navegacion">
            <li><a href="../index.html" class="enlace_menu">Inicio</a></li>
            <li><a href="catalogo.html" class="enlace_menu">Catálogo</a></li>
            <li><a href="promociones.html" class="enlace_menu">Promociones</a></li>
            <li><a href="nosotros.html" class="enlace_menu">Nosotros</a></li>
        </ul>
        <div class="acciones_usuario">
            <a href="favoritos.html" class="boton_accion">
                <img src="../images/favorito.png" alt="Favoritos">
            </a>
            <a href="admin_dashboard.html" class="boton_accion">
                <img src="../images/usuario.png" alt="Usuario">
            </a>
        </div>
    </nav>
</header>

<main class="contenedor_favoritos">
    <div class="encabezado_favoritos">
        <div>
            <h1>Mis Favoritos</h1>
            <p class="contador_favoritos">Tienes <span id="contadorFav">0</span> productos guardados</p>
        </div>
        <div class="acciones_favoritos">
            <button class="boton_secundario" id="btnCompartirLista">
                <i class="fa-regular fa-share-from-square"></i> Compartir lista
            </button>
            <button class="boton_primario boton_whatsapp_lista" id="btnConsultarTodo">
                <i class="fa-brands fa-whatsapp"></i> Consultar todo por WhatsApp
            </button>
        </div>
    </div>

    <div class="filtros_categoria">
        <button class="filtro_activo">Todos</button>
    </div>

    <div class="barra_ordenar">
        <span>Ordenar:</span>
        <select id="ordenarSelect">
            <option value="recientes">Recientes</option>
            <option value="price_asc">Precio: menor a mayor</option>
            <option value="price_desc">Precio: mayor a menor</option>
            <option value="antiguos">Más antiguos</option>
        </select>
    </div>

    <div class="rejilla_favoritos" id="favoritosGrid">
        <div class="cargando">Cargando favoritos...</div>
    </div>

    <div class="banner_whatsapp_favoritos">
        <div>
            <i class="fa-brands fa-whatsapp"></i>
            <div>
                <strong>¿Te gustó algo? ¡Consúltanos por WhatsApp!</strong>
                <p>Envíanos tu lista de favoritos y te asesoramos.</p>
            </div>
        </div>
        <button class="boton_primario" id="btnEnviarLista">
            Enviar lista por WhatsApp <i class="fa-brands fa-whatsapp"></i>
        </button>
    </div>
</main>

<footer class="pie_pagina">
    <div class="contenedor_footer">
        <div class="copyright">© 2026 El rincón de mi Bebé</div>
        <div class="redes_sociales">
            <a href="#" class="boton_red_social"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" class="boton_red_social"><i class="fa-brands fa-facebook-f"></i></a>
        </div>
    </div>
</footer>
<script src="../js/config.js"></script>
<script src="../js/public-session.js"></script>
<script src="../js/global.js"></script>
<script src="../js/favoritos.js"></script>
</body>
</html>
