<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Promociones | El rincón de mi Bebé</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin-wrapper.css">
    <link rel="stylesheet" href="../css/styleadmin-promociones.css">
    
</head>
<body>
        <script>
        if (!sessionStorage.getItem('admin_logged')) {
            window.location.href = 'login.html';
        }
    </script>
<div class="admin-wrapper">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="../images/logo.png" alt="Logo" class="logo-sidebar-img">
            <h3>El rincón de mi Bebé</h3>
            <button class="close-sidebar" id="closeSidebar"><i class="fas fa-times"></i></button>
        </div>
        <nav class="sidebar-nav">
            <a href="admin_dashboard.html" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
            <a href="admin-productos.html" class="nav-item"><i class="fas fa-tshirt"></i><span>Productos</span></a>
            <a href="admin-categorias.html" class="nav-item"><i class="fas fa-tags"></i><span>Categorías / Temporadas</span></a>
            <a href="admin-promociones.html" class="nav-item active"><i class="fas fa-percent"></i><span>Promociones</span></a>
            <a href="admin-configuracion.html" class="nav-item"><i class="fas fa-cog"></i><span>Configuración</span></a>
        </nav>
        <div class="sidebar-footer">
            <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="admin-header">
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
            <div class="header-title">
                <h1>Promociones y Combos</h1>
                <p>Gestiona descuentos por producto, por categoría o crea combos especiales</p>
            </div>
            <div class="header-actions">
                <i class="fas fa-bell"></i>
                <div class="admin-avatar">A</div>
            </div>
        </header>

        <!-- Tres botones principales con estilo uniforme (rosado) -->
        <div class="botones-accion">
            <button id="btnProducto" class="btn-primary">Descuento a producto</button>
            <button id="btnCategoria" class="btn-primary">Descuento a categoría</button>
            <button id="btnCombo" class="btn-primary">Crear combo</button>
        </div>

        <!-- Filtros y búsqueda -->
        <div class="filtros-busqueda">
            <input type="text" id="searchPromo" placeholder="Buscar por título...">
            <select id="tipoFilter">
                <option value="all">Todos los tipos</option>
                <option value="producto">Por producto</option>
                <option value="categoria">Por categoría</option>
                <option value="combo">Combos</option>
            </select>
        </div>

        <!-- Grid de resultados -->
        <div id="promoGrid" class="promos-grid"></div>
    </main>
</div>

<!-- MODAL PRODUCTO -->
<div id="modalProducto" class="modal-overlay" style="display: none;">
    <div class="modal-container">
        <div class="modal-header">
            <h2>Descuento por producto</h2>
            <button class="modal-close" data-modal="modalProducto"><i class="fas fa-times"></i></button>
        </div>
        <form id="formProducto">
            <div class="modal-body">
                <div class="form-group">
                    <label>Título *</label>
                    <input type="text" id="prodTitulo" required>
                </div>
                <div class="form-group">
                    <label>Producto *</label>
                    <select id="prodProducto" required></select>
                </div>
                <div class="form-group">
                    <label>Descuento (%) *</label>
                    <input type="number" id="prodDescuento" min="1" max="100" required>
                </div>
                <div class="form-group">
                    <label>Descripción (opcional)</label>
                    <textarea id="prodDescripcion" rows="2"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Fecha inicio *</label>
                        <input type="date" id="prodFechaInicio" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha fin *</label>
                        <input type="date" id="prodFechaFin" required>
                    </div>
                </div>
                <div class="form-group checkbox">
                    <label><input type="checkbox" id="prodActiva" checked> Activa</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary cerrar-modal" data-modal="modalProducto">Cancelar</button>
                <button type="submit" class="btn-primary">Guardar</button>
            </div>
        </form>
    </div>
</div>

<!-- MODAL CATEGORÍA -->
<div id="modalCategoria" class="modal-overlay" style="display: none;">
    <div class="modal-container">
        <div class="modal-header">
            <h2>Descuento por categoría</h2>
            <button class="modal-close" data-modal="modalCategoria"><i class="fas fa-times"></i></button>
        </div>
        <form id="formCategoria">
            <div class="modal-body">
                <div class="form-group">
                    <label>Título *</label>
                    <input type="text" id="catTitulo" required>
                </div>
                <div class="form-group">
                    <label>Categoría *</label>
                    <select id="catCategoria" required></select>
                </div>
                <div class="form-group">
                    <label>Descuento (%) *</label>
                    <input type="number" id="catDescuento" min="1" max="100" required>
                </div>
                <div class="form-group">
                    <label>Descripción (opcional)</label>
                    <textarea id="catDescripcion" rows="2"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Fecha inicio *</label>
                        <input type="date" id="catFechaInicio" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha fin *</label>
                        <input type="date" id="catFechaFin" required>
                    </div>
                </div>
                <div class="form-group checkbox">
                    <label><input type="checkbox" id="catActiva" checked> Activa</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary cerrar-modal" data-modal="modalCategoria">Cancelar</button>
                <button type="submit" class="btn-primary">Guardar</button>
            </div>
        </form>
    </div>
</div>

<!-- MODAL COMBO -->
<div id="modalCombo" class="modal-overlay" style="display: none;">
    <div class="modal-container modal-large">
        <div class="modal-header">
            <h2>Combo especial</h2>
            <button class="modal-close" data-modal="modalCombo"><i class="fas fa-times"></i></button>
        </div>
        <form id="formCombo">
            <div class="modal-body">
                <div class="form-group">
                    <label>Título del combo *</label>
                    <input type="text" id="comboTitulo" required>
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="comboDescripcion" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label>Descuento (%) *</label>
                    <input type="number" id="comboDescuento" min="1" max="100" required>
                </div>
<div class="form-group">
    <label>Buscar productos</label>
    <input type="text" id="buscarProductoCombo" placeholder="Escribe el nombre del producto...">
    <div id="resultadosBusquedaCombo" class="resultados-busqueda"></div>
</div>
<div class="productos-seleccionados">
    <h4>Productos seleccionados:</h4>
    <div id="listaSeleccionadosCombo" class="lista-seleccionados"></div>
</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Fecha inicio *</label>
                        <input type="date" id="comboFechaInicio" required>
                    </div>
                    <div class="form-group">
                        <label>Fecha fin *</label>
                        <input type="date" id="comboFechaFin" required>
                    </div>
                </div>
                <div class="form-group checkbox">
                    <label><input type="checkbox" id="comboActiva" checked> Activo</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary cerrar-modal" data-modal="modalCombo">Cancelar</button>
                <button type="submit" class="btn-primary">Guardar combo</button>
            </div>
        </form>
    </div>
</div>
<script src="../js/config.js"></script>
<script src="../js/admin-promociones.js"></script>
</body>
</html>
